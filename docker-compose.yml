services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Опционально: если захочешь поднять Postgres в Docker, включи профиль db:
  # docker compose --profile db up --build
  postgres:
    image: postgres:16
    profiles: ['db']
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: anketka_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

